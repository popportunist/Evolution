<!-- ... existing code ... -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE: EVOLUTION - TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
<!-- ... existing code ... -->
<header class="mb-8 border-b-2 border-green-500 pb-4">
    <div class="flex flex-col md:flex-row justify-between items-end gap-4">
        <div>
            <h1 class="text-3xl sm:text-5xl font-bold tracking-tighter">RE: EVOLUTION</h1>
            <p class="text-sm sm:text-base mt-2 opacity-80">> SYSTEM ARCHITECTURE ARCHIVE v2.0</p>
<!-- ... existing code ... -->
    <!-- CUSTOM MESSAGE BOX FOR ERRORS -->
    <div id="msg-box" class="fixed inset-0 bg-black/80 z-50 hidden items-center justify-center">
        <div class="panel-border bg-black p-6 max-w-md w-full mx-4">
            <h3 id="msg-title" class="text-xl font-bold mb-4 text-yellow-500">SYSTEM MESSAGE</h3>
            <p id="msg-content" class="mb-6">Content</p>
            <button onclick="closeMsgBox()" class="w-full border border-green-500 p-2 hover:bg-green-900/30">DISMISS</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Setup Firebase Database
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            // DEPLOYMENT NOTE FOR GITHUB: 
            // Using your custom Firebase configuration
            firebaseConfig = {
                apiKey: "AIzaSyCpy4SH8XBFK_kAj_YCkpAtlAWOk7FJeSM",
                authDomain: "re-evolution-a0a0c.firebaseapp.com",
                projectId: "re-evolution-a0a0c",
                storageBucket: "re-evolution-a0a0c.firebasestorage.app",
                messagingSenderId: "586999729345",
                appId: "1:586999729345:web:19acf0a2b1e243c0659840",
                measurementId: "G-JNC2XFPNZ0"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 're-evolution-tracker';
        let currentUser = null;

        // System State
        let state = {
            sessionDay: 1,
            wil: { points: 0, streak: 0 },
            vit: { points: 0, streak: 0 },
            mnd: { points: 0, streak: 0 },
            quarantineUnlockTime: null
        };

        // DOM Elements Maps
        const UI = {
            sessionDay: document.getElementById('session-day'),
            wilPoints: document.getElementById('wil-points'),
            wilStreak: document.getElementById('wil-streak'),
            wilRank: document.getElementById('wil-rank'),
            wilBoundary: document.getElementById('wil-boundary'),
            vitPoints: document.getElementById('vit-points'),
            vitStreak: document.getElementById('vit-streak'),
            vitRank: document.getElementById('vit-rank'),
            vitMilestone: document.getElementById('vit-milestone'),
            mndPoints: document.getElementById('mnd-points'),
            mndStreak: document.getElementById('mnd-streak'),
            mndRank: document.getElementById('mnd-rank'),
            mndMilestone: document.getElementById('mnd-milestone'),
            splatScreen: document.getElementById('splat-screen')
        };

        // Initialize Authentication
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth failed:", error);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                showToast("System Link Established. Accessing DB.", "info");
                await loadStateFromFirestore();
                updateDashboard();
            }
        });

        initAuth();

        // Database Functions
        async function loadStateFromFirestore() {
            if (!currentUser) return;
            try {
                const stateRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'trackerState');
                const docSnap = await getDoc(stateRef);
                if (docSnap.exists()) {
                    state = docSnap.data();
                } else {
                    await setDoc(stateRef, state);
                }
            } catch (error) {
                console.error("DB Load Error", error);
            }
        }

        async function saveStateToFirestore() {
            if (!currentUser) return;
            try {
                const stateRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'trackerState');
                await setDoc(stateRef, state);
            } catch (error) {
                showToast("Error saving state to DB.", "danger");
            }
        }

        async function logInputsToDatabase(inputs) {
            if (!currentUser) return;
            try {
                const logsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'dailyLogs');
                await addDoc(logsRef, {
                    ...inputs,
                    timestamp: new Date().toISOString(),
                    sessionDayLogged: state.sessionDay
                });
            } catch (error) {
                console.error("Log Error", error);
            }
        }

        // Logic Helpers
        function getWilStatus(points) {
            if(points < 3) return { rank: "Base Slime", bounds: "Confinement: Jelebu Road", color: "text-gray-500" };
            if(points < 5) return { rank: "Slime (+1)", bounds: "Local: Bukit Panjang", color: "text-green-500" };
            if(points < 7) return { rank: "Slime (+2)", bounds: "Corridor: BP & Beauty World", color: "text-green-400" };
            if(points < 14) return { rank: "Slime (Max)", bounds: "ISLAND MAP: Full SG Access", color: "text-blue-400" };
            if(points < 21) return { rank: "Slime (Max)", bounds: "Island Map Active", color: "text-purple-400" };
            if(points < 28) return { rank: "Slime (Max)", bounds: "Island Map + Physical Crucible", color: "text-purple-300" };
            return { rank: "Slime (Max)", bounds: "PLANE UNLOCK: Global Travel", color: "text-yellow-400" };
        }

        function getVitStatus(streak) {
            if(streak < 7) return { rank: "Base Slime", milestone: "Default", color: "text-gray-500" };
            if(streak < 14) return { rank: "Goblin", milestone: "Vocation Shift", color: "text-green-500" };
            if(streak < 21) return { rank: "Goblin (Hob)", milestone: "Hardened State", color: "text-green-400" };
            if(streak < 28) return { rank: "Orc Aspirant", milestone: "Physical Crucible Unlocked", color: "text-purple-400" };
            if(streak < 56) return { rank: "Orc", milestone: "Elite Soldier", color: "text-red-400" };
            if(streak < 84) return { rank: "Battle Orc", milestone: "Apex Conditioning", color: "text-red-500" };
            return { rank: "Ogre Master", milestone: "Apex Predator", color: "text-yellow-500" };
        }

        function getMndStatus(streak) {
            if(streak < 7) return { rank: "Unranked", milestone: "Establishing Baseline", color: "text-gray-500" };
            if(streak < 14) return { rank: "Student", milestone: "Baseline Rhythm Established", color: "text-blue-300" };
            if(streak < 21) return { rank: "Recluse", milestone: "Sensory Dampening Active", color: "text-blue-400" };
            if(streak < 28) return { rank: "Hermit", milestone: "Fretboard/Language Automation", color: "text-purple-400" };
            if(streak < 56) return { rank: "Monk", milestone: "Synthesis Gate 1 Active", color: "text-yellow-400" };
            if(streak < 84) return { rank: "Elder Monk", milestone: "High-Tier Resilience", color: "text-yellow-500" };
            return { rank: "Sage", milestone: "Peak Mental Sovereignty", color: "text-white text-shadow" };
        }

        function updateDashboard() {
            UI.sessionDay.innerText = state.sessionDay.toString().padStart(2, '0');

            UI.wilPoints.innerText = state.wil.points;
            UI.wilStreak.innerText = `${state.wil.streak} Days`;
            const wilStats = getWilStatus(state.wil.points);
            UI.wilRank.innerText = wilStats.rank;
            UI.wilRank.className = `font-bold text-lg ${wilStats.color}`;
            UI.wilBoundary.innerText = wilStats.bounds;

            UI.vitPoints.innerText = state.vit.points;
            UI.vitStreak.innerText = `${state.vit.streak} Days`;
            const vitStats = getVitStatus(state.vit.streak);
            UI.vitRank.innerText = vitStats.rank;
            UI.vitRank.className = `font-bold text-lg ${vitStats.color}`;
            UI.vitMilestone.innerText = vitStats.milestone;

            UI.mndPoints.innerText = state.mnd.points;
            UI.mndStreak.innerText = `${state.mnd.streak} Days`;
            const mndStats = getMndStatus(state.mnd.streak);
            UI.mndRank.innerText = mndStats.rank;
            UI.mndRank.className = `font-bold text-lg ${mndStats.color}`;
            UI.mndMilestone.innerText = mndStats.milestone;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const borderColors = { 'info': 'border-blue-500', 'success': 'border-green-500', 'warning': 'border-yellow-500', 'danger': 'border-red-500' };
            
            toast.className = `bg-black border ${borderColors[type]} p-3 shadow-lg min-w-[250px] animate-fade-in flex items-start`;
            toast.innerHTML = `<span class="mr-2">></span><span class="text-sm">${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        function showMsgBox(title, message) {
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-content').innerText = message;
            document.getElementById('msg-box').style.display = 'flex';
        }

        function closeMsgBox() {
            document.getElementById('msg-box').style.display = 'none';
        }

        async function triggerSplat() {
            state.wil.points = 0; state.wil.streak = 0;
            state.vit.points = 0; state.vit.streak = 0;
            state.mnd.points = 0; state.mnd.streak = 0;
            
            const now = new Date();
            now.setHours(now.getHours() + 48);
            state.quarantineUnlockTime = now.getTime();

            UI.splatScreen.style.display = 'flex';
            updateDashboard();
            await saveStateToFirestore();
        }

        function acknowledgeSplat() {
            UI.splatScreen.style.display = 'none';
            resetFormInputs();
            updateDashboard();
        }

        function resetFormInputs() {
            document.getElementById('chk-cardio').checked = false;
            document.getElementById('chk-gym').checked = false;
            document.getElementById('chk-guitar').checked = false;
            document.getElementById('chk-japanese').checked = false;
            document.getElementById('rad-secure').checked = true;
        }

        async function submitDailyLog() {
            if (!currentUser) {
                showMsgBox("DB ERROR", "System not connected to database. Please wait or check connection.");
                return;
            }

            if (state.quarantineUnlockTime) {
                const now = new Date().getTime();
                if (now < state.quarantineUnlockTime) {
                    const hoursLeft = Math.ceil((state.quarantineUnlockTime - now) / (1000 * 60 * 60));
                    showMsgBox("QUARANTINE ACTIVE", `System locked. Wait ${hoursLeft} hours before re-initializing.`);
                    return;
                } else {
                    state.quarantineUnlockTime = null;
                }
            }

            const cardio = document.getElementById('chk-cardio').checked;
            const gym = document.getElementById('chk-gym').checked;
            const guitar = document.getElementById('chk-guitar').checked;
            const japanese = document.getElementById('chk-japanese').checked;
            const isBreach = document.getElementById('rad-breach').checked;

            const inputLog = { cardio, gym, guitar, japanese, nicotineBreach: isBreach };

            if (isBreach) {
                await logInputsToDatabase(inputLog);
                await triggerSplat();
                return;
            }

            state.wil.points += 1;
            state.wil.streak += 1;
            let notifications = [];

            const vitGain = (cardio ? 1 : 0) + (gym ? 1 : 0);
            state.vit.points += vitGain;
            if (vitGain === 2) {
                state.vit.streak += 1;
            } else {
                if (state.vit.streak > 0) notifications.push("VIT Streak broken! Less than maximum output logged.");
                state.vit.streak = 0;
            }

            const mndGain = (guitar ? 1 : 0) + (japanese ? 1 : 0);
            state.mnd.points += mndGain;
            if (mndGain === 2) {
                state.mnd.streak += 1;
            } else {
                if (state.mnd.streak > 0) notifications.push("MND Streak broken! Less than maximum output logged.");
                state.mnd.streak = 0;
            }

            state.sessionDay += 1;
            updateDashboard();
            resetFormInputs();

            showToast("Syncing with Mainframe...", "info");
            await saveStateToFirestore();
            await logInputsToDatabase(inputLog);
            
            showToast("Daily cycle logged successfully.", "success");
            notifications.forEach(msg => showToast(msg, "warning"));
        }

        // Make functions globally accessible for HTML inline event handlers
        window.closeMsgBox = closeMsgBox;
        window.acknowledgeSplat = acknowledgeSplat;
        window.submitDailyLog = submitDailyLog;
    </script>
</body>
</html>
